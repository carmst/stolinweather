<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | STOLIN WEATHER</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      body { background: #070f12; color: #f0f8fc; font-family: Manrope, sans-serif; }
      .glass-panel { background: rgba(28, 39, 44, 0.45); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    </style>
  </head>
  <body class="min-h-screen bg-[#070f12] text-slate-100">
    <nav class="fixed top-0 z-50 w-full bg-slate-950/60 shadow-2xl shadow-cyan-900/10 backdrop-blur-xl">
      <div class="mx-auto flex max-w-[1920px] items-center justify-between px-8 py-4">
        <a class="text-2xl font-black italic tracking-tighter text-cyan-400" href="/">STOLIN WEATHER</a>
        <div class="hidden items-center gap-8 font-bold tracking-tight md:flex">
          <a class="text-slate-400 transition-colors hover:text-cyan-200" href="/marketplace.html">Marketplace</a>
          <a class="text-slate-400 transition-colors hover:text-cyan-200" href="/methodology.html">Methodology</a>
          <a class="text-slate-400 transition-colors hover:text-cyan-200" href="/watchlist.html">Watchlist</a>
          <a class="text-slate-400 transition-colors hover:text-cyan-200" href="/history.html">History</a>
        </div>
      </div>
    </nav>

    <main class="relative flex min-h-screen items-center justify-center overflow-hidden px-6 py-28">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(109,235,253,0.14),transparent_35%),radial-gradient(circle_at_85%_70%,rgba(255,115,72,0.10),transparent_35%)]"></div>
      <section class="glass-panel relative z-10 w-full max-w-xl rounded-[2rem] border border-white/10 p-8 shadow-2xl">
        <p class="mb-3 text-xs font-bold uppercase tracking-[0.28em] text-cyan-300">User Access</p>
        <h1 class="mb-2 text-4xl font-black tracking-tight" id="auth-mode-label">Sign in to Stolin Weather</h1>
        <p class="mb-8 text-sm leading-6 text-slate-400">Login unlocks the path for personal watchlists, saved signals, and performance tracking. For now this is email/password Supabase Auth.</p>

        <div class="mb-6 rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-slate-300" id="auth-status">Loading auth config...</div>

        <form class="space-y-5" id="auth-form">
          <div class="hidden" id="auth-name-field">
            <label class="mb-2 block text-xs font-bold uppercase tracking-[0.22em] text-slate-500" for="auth-name">Display Name</label>
            <input class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-4 py-3 text-slate-100 placeholder:text-slate-600 focus:border-cyan-300 focus:ring-cyan-300" id="auth-name" placeholder="Colin" type="text" />
          </div>
          <div>
            <label class="mb-2 block text-xs font-bold uppercase tracking-[0.22em] text-slate-500" for="auth-email">Email</label>
            <input class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-4 py-3 text-slate-100 placeholder:text-slate-600 focus:border-cyan-300 focus:ring-cyan-300" id="auth-email" placeholder="you@example.com" required type="email" />
          </div>
          <div>
            <label class="mb-2 block text-xs font-bold uppercase tracking-[0.22em] text-slate-500" for="auth-password">Password</label>
            <input class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-4 py-3 text-slate-100 placeholder:text-slate-600 focus:border-cyan-300 focus:ring-cyan-300" id="auth-password" minlength="6" placeholder="At least 6 characters" required type="password" />
          </div>
          <button class="w-full rounded-2xl bg-cyan-300 px-6 py-4 font-black tracking-tight text-slate-950 transition active:scale-[0.98] disabled:opacity-60" id="auth-submit" type="submit">Sign In</button>
        </form>

        <button class="mt-6 w-full text-sm font-bold text-cyan-300 transition hover:text-cyan-100" id="auth-switch" type="button">Need an account? Create one</button>
      </section>
    </main>
    <script src="/auth-client.js"></script>
    <script src="/auth-page.js"></script>
  </body>
</html>
