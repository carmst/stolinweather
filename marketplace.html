    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .glass-card {
        background: rgba(28, 39, 44, 0.4);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .text-glow {
        text-shadow: 0 0 15px rgba(109, 235, 253, 0.4);
      }
      .asymmetric-gradient {
        background:
          radial-gradient(circle at top left, rgba(109, 235, 253, 0.08), transparent 40%),
          radial-gradient(circle at bottom right, rgba(255, 115, 72, 0.05), transparent 40%);
      }
    </style>

  <body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen asymmetric-gradient">
    <header class="fixed top-0 w-full z-50 bg-slate-950/60 backdrop-blur-xl bg-gradient-to-b from-slate-900/20 to-transparent shadow-2xl shadow-cyan-900/10">
      <nav class="flex justify-between items-center px-8 py-4 max-w-[1920px] mx-auto">
        <div class="flex items-center gap-12">
          <div class="text-2xl font-black text-cyan-400 italic tracking-tighter font-headline uppercase">STOLIN WEATHER</div>
          <div class="hidden md:flex items-center gap-8 font-headline font-bold tracking-tight">
            <a class="text-slate-400 hover:text-cyan-200 transition-colors" href="/">Landing</a>
            <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1" href="/marketplace.html">Marketplace</a>
            <a class="text-slate-400 hover:text-cyan-200 transition-colors" href="/methodology.html">Methodology</a>
            <a class="text-slate-400 hover:text-cyan-200 transition-colors" href="/watchlist.html">Watchlist</a>
            <a class="text-slate-400 hover:text-cyan-200 transition-colors" href="/history.html">History</a>
          </div>
        </div>
        <div class="flex items-center gap-6">
          <div class="relative hidden lg:block">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">search</span>
            <input
              class="bg-slate-950/50 border-none rounded-xl pl-10 pr-4 py-2 text-sm text-on-surface-variant focus:ring-1 focus:ring-primary w-64"
              id="marketplace-search"
              placeholder="Search markets..."
              type="text"
            />
          </div>
          <div class="flex gap-4">
            <button class="hover:bg-white/5 rounded-lg transition-all duration-300 p-2 text-slate-400 scale-95 active:scale-90">
              <span class="material-symbols-outlined">notifications</span>
            </button>
            <a class="hover:bg-white/5 rounded-lg transition-all duration-300 p-2 text-slate-400 scale-95 active:scale-90" href="/profile.html" aria-label="Profile">
              <span class="material-symbols-outlined">account_circle</span>
            </a>
          </div>
        </div>
      </nav>
    </header>
    <main class="pt-28 pb-20 px-8 max-w-[1400px] mx-auto" id="marketplace-root"></main>
    <footer class="w-full py-12 mt-20 bg-slate-950 border-t border-white/5">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-12 max-w-7xl mx-auto">

    <script src="/loading-state.js" defer></script>
